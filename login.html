<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Café Aroma — Iniciar Sesión</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="login-page">

  <div class="login-wrapper">
    <div class="login-brand">
      <div class="brand-icon">☕</div>
      <h1>Café Aroma</h1>
      <p>El sabor que despierta tu día</p>
    </div>

    <div class="login-card">
      <h2>Bienvenido</h2>
      <p class="login-subtitle">Inicia sesión para continuar</p>

      <div id="error-msg" class="error-msg hidden">
        ⚠️ Usuario o contraseña incorrectos.
      </div>

      <div class="form-group">
        <label for="username">Usuario</label>
        <input type="text" id="username" placeholder="Ingresa tu usuario" autocomplete="off" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="Ingresa tu contraseña" />
      </div>

      <button class="btn-login" id="btn-login">Entrar</button>

      <p class="login-hint">
        Credenciales de prueba: <strong>admin</strong> / <strong>cafe123</strong>
      </p>
    </div>
  </div>

  <script src="js/login.js"></script>
</body>
</html>
